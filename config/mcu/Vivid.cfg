[mcu vivid]
serial: <insert_serial>

[temperature_sensor vivid]
sensor_type: temperature_mcu
sensor_mcu: vivid

[mcu vivid_buffer]
serial: <insert_serial>

[temperature_sensor vivid_buffer]
sensor_type: temperature_mcu
sensor_mcu: vivid_buffer

[board_pins vivid]
mcu: vivid
aliases:
    MSEL_STEP=PD3   , MSEL_DIR=PD2  , MSEL_EN=PB4   , MSEL_UART=PB3,
    MDRV_STEP=PB6   , MDRV_DIR=PB5  , MDRV_EN=PB8   , MDRV_UART=PB7,

	PREP1=PA0		, PREP2=PA1  	, PREP3=PA2 	, PREP4=PA3,
    SEL1=PD0        , SEL2=PA15     , SEL3=PD1      , SEL4=PC13,
	
	RGB1=PC6		, RGB2=PC7,
    RFID0_CS=PD14   , RFID1_CS=PA8  , RFID_SPI=spi2_PB2_PB11_PB10

[board_pins vivid_buffer]
mcu: vivid_buffer
aliases:
    LOAD1=PA0 		, LOAD2=PA1     , LOAD3=PA2		, LOAD4=PA3,
    TRAIL=PA4       , ADV=PA5