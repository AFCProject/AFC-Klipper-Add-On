

[AFC_vivid vivid_1]
hub: vivid_1
extruder: extruder
buffer: vivid_buffer
drive_stepper: vivid_drive
selector_stepper: vivid_selector
long_moves_speed: 120
long_moves_accel:50

[AFC_stepper vivid_drive]
unit: vivid_1
step_pin: vivid:MDRV_STEP
dir_pin: vivid:MDRV_DIR
enable_pin: !vivid:MDRV_EN
microsteps: 16
rotation_distance: 360
gear_ratio: 43:1

[tmc2209 AFC_stepper vivid_drive]
uart_pin: vivid:MDRV_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_stepper vivid_selector]
unit: vivid_1
step_pin: vivid:MSEL_STEP
dir_pin: vivid:MSEL_DIR
enable_pin: !vivid:MSEL_EN
microsteps: 16
rotation_distance: 400
gear_ratio: 2.5:1

[tmc2209 AFC_stepper vivid_selector]
uart_pin: vivid:MSEL_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_lane lane1]
unit: vivid_1:1
dist_hub: 1000 
led_index: AFC_Indicator_5:1-7
load: vivid_buffer:LOAD1
prep: vivid:PREP1
selector: !vivid:SEL1

[AFC_lane lane2]
unit: vivid_1:2
dist_hub: 1000 
led_index: AFC_Indicator_5:8-14
load: vivid_buffer:LOAD2
prep: vivid:PREP2
selector: !vivid:SEL2

[AFC_lane lane3]
unit: vivid_1:3
dist_hub: 1000 
led_index: AFC_Indicator_6:1-7
load: vivid_buffer:LOAD3
prep: vivid:PREP3
selector: !vivid:SEL3

[AFC_lane lane4]
unit: vivid_1:4
dist_hub: 1000 
led_index: AFC_Indicator_6:8-14
load: vivid_buffer:LOAD4
prep: vivid:PREP4
selector: !vivid:SEL4

[AFC_buffer vivid_buffer]
advance_pin: vivid_buffer:ADV
trailing_pin: vivid_buffer:TRAIL
multiplier_high: 1.15
multiplier_low: 0.90

[AFC_hub vivid_1]
afc_bowden_length: 2000        # Length of the Bowden tube from the hub to the toolhead sensor in mm.
move_dis: 20                   # Distance to move the filament within the hub in mm.
hub_clear_move_dis: 20
switch_pin: virtual

[AFC_led AFC_Indicator_1]
pin: vivid:RGB1
chain_count: 14
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0

[AFC_led AFC_Indicator_2]
pin: vivid:RGB2
chain_count: 14
color_order: GRB
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0