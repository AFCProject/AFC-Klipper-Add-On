[include mcu/EMU_EBB_36_42.cfg]

[mcu emu_lane1]
canbus_uuid: <replace with your can UUID>
#serial: <replace with your /dev/serial/by-id/...> and comment out canbus_uuid above

[temperature_sensor emu_lane1]
sensor_type: temperature_mcu
sensor_mcu: emu_lane1

[mcu emu_lane2]
canbus_uuid: <replace with your can UUID>
#serial: <replace with your /dev/serial/by-id/...> and comment out canbus_uuid above

[temperature_sensor emu_lane2]
sensor_type: temperature_mcu
sensor_mcu: emu_lane2

[AFC_EMU EMU_1]
hub: Turtle_1
extruder: extruder
buffer: EMU_1_buffer # If not defined below from the install script, uncomment and add buffer name if using a buffer
long_moves_speed: 300   # Speed has been tested up to 500mm, recommend running 400mm/s or less
long_moves_accel: 300

[AFC_stepper lane1]
unit: EMU_1:1
step_pin: emu_lane1:MOT_STEP
dir_pin: emu_lane1:MOT_DIR
enable_pin: !emu_lane1:MOT_EN
microsteps: 16
rotation_distance: 22.7574		
gear_ratio: 1:1
dist_hub: 2000
park_dist: 10
led_index: EMU_Indicator_1:1
led_spool_index: EMU_Indicator_1:2
prep: ^!emu_lane1:TRG
load: ^emu_lane1:LOAD

[tmc2209 AFC_stepper lane1]
uart_pin: emu_lane1:MOT_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_button lane1]
pin: ^!emu_lane1:BUTTON

[temperature_sensor lane1]
sensor_type: BME280
i2c_address: 118
i2c_mcu: emu_lane1
i2c_software_scl_pin: emu_lane1:TEMP_SCL
i2c_software_sda_pin: emu_lane1:TEMP_SCA

[controller_fan emu_fan_lane1]
pin: emu_lane1:FAN
max_power: 1
kick_start_time: 0.5
stepper: AFC_stepper lane1




[AFC_stepper lane2]
unit: EMU_1:2
step_pin: emu_lane2:MOT_STEP
dir_pin: emu_lane2:MOT_DIR
enable_pin: !emu_lane2:MOT_EN
microsteps: 16
rotation_distance: 22.7574		
gear_ratio: 1:1
dist_hub: 2000
park_dist: 10
led_index: EMU_Indicator_2:1
led_spool_index: EMU_Indicator_2:2
prep: ^!emu_lane2:TRG
load: ^emu_lane2:LOAD

[tmc2209 AFC_stepper lane2]
uart_pin: emu_lane2:MOT_UART
uart_address: 0
run_current: 0.8
sense_resistor: 0.110

[AFC_button lane2]
pin: ^!emu_lane2:BUTTON

[temperature_sensor lane2]
sensor_type: BME280
i2c_address: 118
i2c_mcu: emu_lane2
i2c_software_scl_pin: emu_lane2:TEMP_SCL
i2c_software_sda_pin: emu_lane2:TEMP_SCA

[controller_fan emu_fan_lane2]
pin: emu_lane2:FAN
max_power: 1
kick_start_time: 0.5
stepper: AFC_stepper lane2

[AFC_buffer EMU_1_buffer]
advance_pin: emu_lane1:BUFFER_ADV
trailing_pin: emu_lane1:BUFFER_TRL
multiplier_high: 1.15
multiplier_low: 0.90

# EMU hub is defaulted to hub without no sensor, if using a hub with a sensor
# please change the following:
#  - replace "virtual" with actual sensor pin. When changing to a actual pin
#  - update dist_hub variable in each AFC_stepper section to be around what
#    the PTFE length is between the load sensor and hub sensor.
#  - remove/comment out `use_dist_hub: True` line
[AFC_hub EMU_HUB_1]
afc_bowden_length: 2000     # Length of the Bowden tube from the hub to the toolhead sensor in mm.
hub_clear_move_dis: 5
switch_pin: virtual
use_dist_hub: True

[AFC_led EMU_Indicator_1]
pin: emu_lane1:RGB
chain_count: 2
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0

[AFC_led EMU_Indicator_2]
pin: emu_lane2:RGB
chain_count: 2
color_order: GRBW
initial_RED: 0.0
initial_GREEN: 0.0
initial_BLUE: 0.0
initial_WHITE: 0.0